# ===================================================
# 校园二手交易平台 - 应用配置
# 所有敏感值通过环境变量注入，未设置时使用默认值
# ===================================================

spring:
  application:
    name: CampusSecondHandTradingPlatform_backend
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cuzssp}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:50MB}

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

jwt:
  secret: ${JWT_SECRET:cuzssp-jwt-secret-key-default}
  expiration: ${JWT_EXPIRATION:86400000}

chat:
  secret:
    key: ${CHAT_SECRET_KEY:cuzssp-chat-secret-key-default}

s3:
  config:
    storage-support: ${STORAGE_SUPPORT:r2}
    account-id: ${ACCOUNT_ID}
    access-key: ${ACCESS_KEY_ID}
    secret-key: ${SECRET_ACCESS_KEY}
    endpoint: ${ENDPOINT}
    bucket-name: ${BUCKET_NAME:demo}
    child-folder: ${CHILD_FOLDER:demo/2026/}
    cdn-domain: ${PUBLIC_URL}
    region: ${REGION:auto}
